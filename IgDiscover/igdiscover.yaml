## IgDiscover configuration
iterations: 1
sequence_type: Ig

## Barcoding settings
barcode_length_5prime: 0
barcode_length_3prime: 0
barcode_consensus: false
cdr3_location: 'detect'
race_g: false

## Primer-related settings
stranded: false
forward_primers: []
reverse_primers: []

# These are single-end Iso-Seq reads so 
# minimum_merged_read_length & flash_maximum_overlap parameteres are removed
dereplicate_minimum_length: 50
rename: false
debug: false
seed: 1

preprocessing_filter:
  v_coverage: 1
  j_coverage: 0.1
  v_evalue: 0.01

## Candidate discovery settings
ignore_j: true                  # ignores J genes during clustering step; more unique V/J pairs were observed producing smaller clusters
subsample: 5000                 # increases sample size from 1000 to capture rarer alleles
d_coverage: 1

## V candidate filtering
pre_germline_filter:
  unique_cdr3s: 1
  unique_js: 0
  whitelist: false
  cluster_size: 1
  allow_stop: true
  cross_mapping_ratio: 0.0
  clonotype_ratio: 0.0
  exact_ratio: 0.0
  cdr3_shared_ratio: 1.0
  unique_d_ratio: 0.0

germline_filter:
  unique_cdr3s: 1
  unique_js: 0
  whitelist: false
  cluster_size: 1
  allow_stop: true
  cross_mapping_ratio: 0.0
  clonotype_ratio: 0.0
  exact_ratio: 0.0
  cdr3_shared_ratio: 1.0
  unique_d_ratio: 0.0

## J discovery settings
## Permissive parameters used, but no new J genes were discovered
j_discovery:
  allele_ratio: 0.0                  # force discovery even for low frequent alleles
  cross_mapping_ratio: 1.0           # ignore potential cross-mapping
  propagate: true
  min_cdr3_support: 1
  min_cluster_size: 1
  debug: true
  output_all: true
  include_unchanged: true             # Also write unchanged alleles from the database
  consensus_identity_threshold: 0.00  # Accept lower identity consensus
  min_sequence_count: 1               # Do not require abundance filtering
  max_j_shm: 99                       # Allow highly mutated J alleles
  min_identity: 0.0                   # Accept very divergent alleles

## diisables linkage clustering
discover:
   cluster_exact: 1
   no_cluster: true                   # enables singleton clusters & disables linkage clustering
